<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – MessTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css"/>
  <link rel="stylesheet" href="/static/css/auth.css"/>
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-brand">🌿 MessTrack</div>
    <h1 class="auth-title">Create account</h1>
    <p class="auth-sub">Start tracking food waste today</p>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="full_name" placeholder="Riya Sharma"/>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="riya123"/>
    </div>
    <div class="form-group">
      <label>Password <span class="muted">(min 4 chars)</span></label>
      <input type="password" id="password" placeholder="••••••••"/>
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="role">
        <option value="Student">Student</option>
        <option value="Mess Staff">Mess Staff</option>
        <option value="Admin">Admin</option>
      </select>
    </div>

    <div class="msg" id="msg"></div>
    <button class="btn" onclick="doRegister()">Create Account</button>

    <p class="auth-switch">Already have an account? <a href="/login">Sign in</a></p>
  </div>

  <script>
    document.addEventListener("keydown", e => { if (e.key === "Enter") doRegister(); });

    async function doRegister() {
      const full_name = document.getElementById("full_name").value.trim();
      const username  = document.getElementById("username").value.trim();
      const password  = document.getElementById("password").value;
      const role      = document.getElementById("role").value;

      if (!username || !password) return showMsg("Username and password are required.", "error");

      const res  = await fetch("/api/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password, full_name, role })
      });
      const data = await res.json();
      if (res.ok) {
        showMsg("Account created! Redirecting to login…", "ok");
        setTimeout(() => window.location.href = "/login", 1200);
      } else {
        showMsg(data.error, "error");
      }
    }

    function showMsg(text, type) {
      const el = document.getElementById("msg");
      el.textContent = text;
      el.className = "msg " + type;
    }
  </script>
</body>
</html>
